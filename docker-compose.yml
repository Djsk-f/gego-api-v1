version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: gego-postgres
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      POSTGRES_DB: ${DATABASE_NAME:-gego_api}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-postgres} -d ${DATABASE_NAME:-gego_api}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - gego-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: gego-api
    environment:
      NODE_ENV: production
      PORT: 3000
      API_PREFIX: api/v1
      CORS_ORIGIN: '*'
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USERNAME: ${DATABASE_USERNAME:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      DATABASE_NAME: ${DATABASE_NAME:-gego_api}
      DATABASE_SYNCHRONIZE: "true"
      DATABASE_LOGGING: "false"
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-access-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-secret}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gego-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  gego-network:
    driver: bridge
